<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нейро-контурное управление мотивацией</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0b0b1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; position: relative; }

        /* ── Фоновый эффект ── */
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.3; z-index: 0; }
        .glow-1 { top: -200px; right: -200px; background: #6c3ce0; }
        .glow-2 { bottom: -200px; left: -200px; background: #00b4d8; }

        .container { position: relative; z-index: 1; text-align: center; padding: 40px 24px; max-width: 820px; }

        /* ── Бейдж ── */
        .badge { display: inline-block; background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); padding: 6px 20px; border-radius: 40px; font-size: 12px; letter-spacing: 0.04em; color: #a0a0c0; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px; }

        /* ── Заголовки ── */
        h1 { font-size: clamp(36px, 6vw, 72px); font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sub { font-size: clamp(18px, 2vw, 24px); color: #a0a0c0; margin-top: 16px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* ── Метафора ── */
        .metaphor { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 32px 0; flex-wrap: wrap; }
        .metaphor-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 24px; border-radius: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(4px); min-width: 120px; }
        .metaphor-item .icon { font-size: 32px; }
        .metaphor-item .label { font-size: 14px; font-weight: 500; color: #c0c0e0; }
        .metaphor-item .desc { font-size: 12px; color: #8080a0; }
        .metaphor-arrow { font-size: 28px; color: #6c3ce0; }

        /* ── Кнопка ── */
        .btn { display: inline-block; background: linear-gradient(135deg, #6c3ce0, #4f46e5); color: #fff; padding: 16px 44px; border-radius: 50px; font-weight: 600; font-size: 18px; text-decoration: none; transition: all 0.3s; box-shadow: 0 8px 40px rgba(108, 60, 224, 0.35); border: none; cursor: pointer; }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 48px rgba(108, 60, 224, 0.5); }
        .btn-secondary { background: rgba(255,255,255,0.08); box-shadow: none; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); margin-left: 12px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); box-shadow: none; }

        .btn-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 32px; }

        /* ── Цифры ── */
        .stats { display: flex; justify-content: center; gap: 40px; margin-top: 48px; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat .num { font-size: 28px; font-weight: 700; color: #a78bfa; display: block; }
        .stat .lbl { font-size: 13px; color: #8080a0; }

        /* ── Адаптив ── */
        @media (max-width: 600px) {
            .metaphor { gap: 12px; }
            .metaphor-item { min-width: 80px; padding: 12px 16px; }
            .metaphor-arrow { font-size: 20px; }
            .stats { gap: 20px; }
            .stat .num { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<div class="container">
  
    <h1>Нейро-контурное<br>управление мотивацией</h1>
    <p class="sub">Системная архитектура, где внешние стимулы и внутренний смысл работают как единый механизм.</p>

    <!-- Метафора -->
    <div class="metaphor">
        <div class="metaphor-item">
            <span class="icon">⚡</span>
            <span class="label">Внешний контур</span>
            <span class="desc">Баллы · KPI · Премии</span>
        </div>
        <span class="metaphor-arrow">⟷</span>
        <div class="metaphor-item" style="border-color: rgba(108,60,224,0.3);">
            <span class="icon">🧠</span>
            <span class="label">Внутренний контур</span>
            <span class="desc">СМЫСЛ · РОСТ · ПРИЗНАНИЕ</span>
        </div>
    </div>

    <div class="btn-group">
<a href="general-presentation.html" class="btn" target="_blank">📊 Смотреть презентацию</a>
<a href="#" class="btn btn-secondary" onclick="alert('Ссылка на статью появится после публикации'); return false;">📄 Читать статью</a>
    </div>


</div>
    <!-- ═══ ФУТЕР ═══ -->
    <div style="margin-top: 48px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; font-size: 14px; color: #8080a0;">
        <a href="index.html" style="color: #a78bfa; text-decoration: none; transition: 0.2s;">← На главный сайт</a>
        <span style="color: #555;">|</span>
        <a href="mailto:centrncm@yandex.ru" style="color: #a78bfa; text-decoration: none; transition: 0.2s;">centrncm@yandex.ru</a>
    </div>
</div>
</body>
</body>
</html>
